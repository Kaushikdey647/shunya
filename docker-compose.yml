# Local TimescaleDB for shunya market data + fundamentals (see docs/data_timescale.md).
services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shunya
    volumes:
      - shunya_ts_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shunya"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: python:3.12-bookworm
    working_dir: /workspace
    volumes:
      - .:/workspace
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@timescaledb:5432/shunya
    depends_on:
      timescaledb:
        condition: service_healthy
    command:
      - bash
      - -lc
      - |
        pip install --no-cache-dir uv &&
        cd /workspace &&
        uv sync --frozen --extra api --extra timescale &&
        uv run uvicorn backtest_api.main:app --host 0.0.0.0 --port 8000

volumes:
  shunya_ts_data:
